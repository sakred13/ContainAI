services:
  # ---- BACKEND: Shared Ollama Model Engine ----
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---- GATEWAY: Gradio Frontend (Model Selector UI) ----
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: llama_gateway
    ports:
      - "7860:7860"
    volumes:
      - ./gateway:/app
      - ./conversations:/data/conversations
    depends_on:
      - agent_llama
      - agent_llama_8b
      - agent_gemma
      - agent_qwen
      - agent_dolphin
      - agent_deepseek
    restart: unless-stopped

  # ---- AGENT: Llama 3.2 ----
  agent_llama:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent_llama
    environment: &agent_env
      OLLAMA_BASE_URL: http://ollama:11434
      AGENT_LLAMA_URL: http://agent_llama:5000
      AGENT_LLAMA8B_URL: http://agent_llama_8b:5000
      AGENT_GEMMA_URL: http://agent_gemma:5000
      AGENT_QWEN_URL: http://agent_qwen:5000
      AGENT_DOLPHIN_URL: http://agent_dolphin:5000
      AGENT_DEEPSEEK_URL: http://agent_deepseek:5000
      MODEL_NAME: llama3.2
    volumes:
      - ./agent:/app
    depends_on:
      - ollama
    restart: unless-stopped

  # ---- AGENT: Llama 3.1 8B ----
  agent_llama_8b:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent_llama_8b
    environment:
      <<: *agent_env
      MODEL_NAME: llama3.1
    volumes:
      - ./agent:/app
    depends_on:
      - ollama
    restart: unless-stopped
  # ---- MODERN_UI: Custom Premium Frontend (Glassmorphism & HTML proxy) ----
  modern_ui:
    build:
      context: ./modern_ui
      dockerfile: Dockerfile
    container_name: modern_ui
    ports:
      - "8080:8080"
    volumes:
      - ./modern_ui:/app
      - ./conversations:/data/conversations
    environment:
      CONVERSATIONS_DIR: /data/conversations
      AGENT_LLAMA_URL: http://agent_llama:5000
      AGENT_LLAMA8B_URL: http://agent_llama_8b:5000
      AGENT_GEMMA_URL: http://agent_gemma:5000
      AGENT_QWEN_URL: http://agent_qwen:5000
      AGENT_DOLPHIN_URL: http://agent_dolphin:5000
      AGENT_DEEPSEEK_URL: http://agent_deepseek:5000
    depends_on:
      - agent_llama
      - agent_llama_8b
      - agent_gemma
      - agent_qwen
      - agent_dolphin
      - agent_deepseek
    restart: unless-stopped

  # ---- AGENT: Gemma 3 4B ----
  agent_gemma:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent_gemma
    environment:
      <<: *agent_env
      MODEL_NAME: gemma3:4b
    volumes:
      - ./agent:/app
    depends_on:
      - ollama
    restart: unless-stopped

  # ---- AGENT: Qwen 2.5 Coder (Coding Specialist) ----
  agent_qwen:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent_qwen
    environment:
      <<: *agent_env
      MODEL_NAME: qwen2.5-coder
    volumes:
      - ./agent:/app
    depends_on:
      - ollama
    restart: unless-stopped

  # ---- AGENT: Dolphin Mistral (Uncensored Variant) ----
  agent_dolphin:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent_dolphin
    environment:
      <<: *agent_env
      MODEL_NAME: dolphin-mistral
    volumes:
      - ./agent:/app
    depends_on:
      - ollama
    restart: unless-stopped

  # ---- AGENT: DeepSeek R1 7B (Reasoning Model) ----
  agent_deepseek:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agent_deepseek
    environment:
      <<: *agent_env
      MODEL_NAME: deepseek-r1:7b
    volumes:
      - ./agent:/app
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
